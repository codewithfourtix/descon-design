<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AILAB — Descon | Laboratory Automation Backbone</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,300;0,400;0,500;0,700;1,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<div class="app">
  <div class="workspace-layout">
    <!-- ===== Left Compact Icon Rail ===== -->
    <nav class="nav-rail">
      <div class="rail-logo" title="Descon Assure LIQS">
        <img class="mark-img" src="assets/logo.jpg" alt="Descon">
      </div>
      <div class="rail-items" id="rail-items">
        <!-- Rendered via JS -->
      </div>
      <div class="rail-bottom">
        <div class="iconbtn rail-btn" onclick="toggleNotif(event)" title="Notifications"><i data-lucide="bell"></i><span class="badge-dot"></span></div>
        <div class="iconbtn rail-btn files-toggle" onclick="toggleFiles()" title="Files (F)"><i data-lucide="folder-tree"></i></div>
        <div class="iconbtn rail-btn" onclick="toggleProfile(event)"><div class="avatar" style="width:28px;height:28px;font-size:11px">DU</div></div>
      </div>
    </nav>

    <!-- ===== Secondary Module Panel ===== -->
    <aside class="module-panel" id="module-panel"></aside>
    <div class="panel-resizer" id="module-panel-resizer" title="Drag to resize"></div>

    <!-- ===== Main Work Area ===== -->
    <main class="main-workspace">
      <!-- Command Bar -->
      <header class="command-bar">
        <div class="crumb"><span id="crumb-page">Overview</span></div>
        <div class="spacer"></div>
        <div id="page-commands" class="page-commands"></div>
        <div class="search"><i data-lucide="search" style="width:14px"></i><input id="global-search" placeholder="Search operations, samples, areas..." onkeydown="if(event.key==='Enter')globalSearch(this.value)"></div>
        <div class="iconbtn" onclick="downloadCurrent()"><i data-lucide="download"></i></div>
        <div class="iconbtn" onclick="toggleAssistant()" title="AI Assistant"><i data-lucide="sparkles"></i></div>
      </header>

      <div class="content" id="content"></div>
      <footer class="footer">© 2026 Descon — Partner in Progress · Assure LIQS (Laboratory Information &amp; Quality System) | All Rights Reserved.</footer>
    </main>

    <!-- ===== Global Assistant Drawer ===== -->
    <aside class="assistant-drawer" id="assistant-drawer"></aside>

    <!-- ===== Right-docked file explorer ===== -->
    <div class="filepanel-resizer" id="filepanel-resizer" title="Drag to resize"></div>
    <aside class="filepanel" id="filepanel"></aside>
  </div>
</div>

<!-- data + screens + app -->
<script src="js/data.js"></script>
<script src="js/ui.js"></script>
<script src="js/data-extra.js"></script>
<script src="js/data-descon.js"></script>
<script src="js/ai-engine.js"></script>
<script src="js/charts.js"></script>
<script src="js/screens/dashboard.js"></script>
<script src="js/screens/site.js"></script>
<script src="js/screens/labsheet.js"></script>
<script src="js/screens/quality.js"></script>
<script src="js/screens/special.js"></script>
<script src="js/screens/iso.js"></script>
<script src="js/screens/docs.js"></script>
<script src="js/screens/chemicals.js"></script>
<script src="js/screens/modules.js"></script>
<script src="js/screens/files.js"></script>
<script src="js/screens/ai.js"></script>
<script src="js/app.js"></script>
</body>
</html>
